services:
  # Le "Cerveau" : maintient la version cachée à jour
  git-proxy:
    image: hownetworks/git-cache-http-proxy
    volumes:
      - git_cache:/cache
    environment:
      - PORT=8080
    restart: always

  # Les "Action Workers" avec Docker-out-of-Docker
  runner-1:
    image: myoung34/github-runner:latest
    environment:
      - RUNNER_SCOPE=org
      - ORG_NAME=${ORG_NAME}
      - RUNNER_NAME_PREFIX=${RUNNER_PREFIX}
      - RUNNER_GROUP=${RUNNER_GROUP}
      - RANDOM_RUNNER_SUFFIX=true
      - LABELS=${RUNNER_LABELS:-tower,linux}
      - ACCESS_TOKEN=${GH_TOKEN}
      - RUNNER_WORKDIR=/tmp/runner/runner-1
      - GIT_CONFIG_PARAMETERS='url.http://git-proxy:8080/github.com/.insteadOf=https://github.com/'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/runner/runner-1:/tmp/runner/runner-1
    depends_on:
      - git-proxy
    restart: unless-stopped

